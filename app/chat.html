<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FridAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      min-height: 100vh;
      font-family: sans-serif; 
      background: #f0f0f0; 
      display: flex; 
      justify-content: center; 
      padding: 40px 20px; 
    }

    .container { 
      width: 100%; 
      max-width: 700px; 
    }

    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 75vh;
    }

    #login-form { 
      background: white; 
      border-radius: 12px; 
      border: 1px solid #ddd; 
      padding: 40px 50px;
      width: 340px;
    }

    #login-form h2 { 
      margin-bottom: 24px;
      font-size: 28px;
      color: #333;
      text-align: center;
    }

    #login-form input { 
      width: 100%; 
      margin-bottom: 10px; 
      border-radius: 8px; 
      border: 1px solid #ddd; 
      font-size: 15px;
      padding: 12px 14px;
    }

    #chat-area {
      min-height: 600px;
      width: 100%;
    }

    #messages { 
      background: white; 
      border-radius: 12px;
      padding: 20px; 
      height: 500px; 
      overflow-y: auto; 
      margin-bottom: 12px; 
      border: 1px solid #ddd; 
    }

    .msg { margin-bottom: 12px; }

    .msg.user { text-align: right; }

    .msg.user span { 
      background: #4f46e5; 
      color: white; 
      padding: 10px 16px; 
      border-radius: 18px 18px 4px 18px; 
      display: inline-block; 
      max-width: 80%; 
    }

    .msg.ai span { 
      background: #04225e; 
      color: #e0e0e0; 
      padding: 10px 16px; 
      border-radius: 18px 18px 18px 4px; 
      display: inline-block; 
      max-width: 80%; 
      white-space: pre-wrap; 
    }

    .input-row { display: flex; gap: 8px; }

    input[type=text], input[type=password], input[type=email] { 
      flex: 1; 
      padding: 14px 16px; 
      border-radius: 8px; 
      border: 1px solid #ddd; 
      font-size: 16px; 
    }

    button { 
      padding: 14px 24px; 
      background: #4f46e5; 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 16px; 
    }

    button:disabled { background: #888; cursor: not-allowed; }

    #status { font-size: 14px; margin-bottom: 10px; font-weight: 600; }

    .thinking { font-style: italic; color: #999; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Login -->
    <div class="login-container">
      <div id="login-form">
        <h2>FridAI</h2>
        <div id="login-status" style="color:red;font-size:13px;margin-bottom:8px"></div>
        <input id="email" type="email" placeholder="Email"/>
        <input id="password" type="password" placeholder="Password"/>
        <button onclick="login()" style="width:100%">Entrar</button>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat-area" style="display:none">
      <div id="status" style="color:green;margin-bottom:10px;font-size:13px;font-weight:600">● Online — Ticket #1</div>
      <div id="messages"></div>
      <div class="input-row">
        <input id="input" type="text" placeholder="Escreve a tua mensagem..." autocomplete="off"/>
        <button id="btn" onclick="enviar()">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    const TICKET_ID = 1;
    const API_BASE = "http://127.0.0.1:8000";
    let token = localStorage.getItem("fridai_token");
    let refreshToken = localStorage.getItem("fridai_refresh");

    if (token) {
      document.querySelector(".login-container").style.display = "none";
      document.getElementById("chat-area").style.display = "block";
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
      });

      if (!res.ok) {
        document.getElementById("login-status").textContent = "Credenciais inválidas";
        return;
      }

      const data = await res.json();
      token = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem("fridai_token", token);
      localStorage.setItem("fridai_refresh", refreshToken);

      document.querySelector(".login-container").style.display = "none";
      document.getElementById("chat-area").style.display = "block";
      document.getElementById("input").focus();
    }

    async function renovarToken() {
      if (!refreshToken) return false;

      const res = await fetch(`${API_BASE}/auth/refresh`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: refreshToken })
      });

      if (!res.ok) return false;

      const data = await res.json();
      token = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem("fridai_token", token);
      localStorage.setItem("fridai_refresh", refreshToken);
      return true;
}
    function mostrarLogin(mensagem) {
      document.getElementById("chat-area").style.display = "none";
      document.querySelector(".login-container").style.display = "flex";
      if (mensagem) document.getElementById("login-status").textContent = mensagem;
      token = null;
      localStorage.removeItem("fridai_token");
    }

    async function renovarToken() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      if (!email || !password) return false;

      const res = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
      });

      if (!res.ok) return false;
      const data = await res.json();
      token = data.access_token;
      localStorage.setItem("fridai_token", token);
      return true;
    }

    function addMessage(role, text) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = `<span>${text}</span>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function enviar() {
      const input = document.getElementById("input");
      const btn = document.getElementById("btn");
      const texto = input.value.trim();
      if (!texto) return;

      addMessage("user", texto);
      input.value = "";
      btn.disabled = true;

      const thinkingDiv = document.createElement("div");
      thinkingDiv.className = "msg ai";
      thinkingDiv.innerHTML = `<span class="thinking">A pensar...</span>`;
      document.getElementById("messages").appendChild(thinkingDiv);
      document.getElementById("messages").scrollTop = 99999;

      try {
        let res = await fetch(`${API_BASE}/chat/${TICKET_ID}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ mensagem: texto })
        });

        if (res.status === 401) {
          const renovado = await renovarToken();
          if (renovado) {
            res = await fetch(`${API_BASE}/chat/${TICKET_ID}`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
              },
              body: JSON.stringify({ mensagem: texto })
            });
          } else {
            thinkingDiv.remove();
            mostrarLogin("Sessão expirada — faz login novamente");
            return;
          }
        }

        if (!res.ok) {
          thinkingDiv.remove();
          addMessage("ai", `Erro ${res.status} — tenta novamente.`);
          return;
        }

        const data = await res.json();
        thinkingDiv.remove();
        addMessage("ai", data.resposta || "Sem resposta");

      } catch (err) {
        thinkingDiv.remove();
        addMessage("ai", "Erro ao ligar ao servidor.");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter") enviar();
    });
  </script>
</body>
</html>
