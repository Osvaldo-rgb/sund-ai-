<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f766e">
  <title>sundai</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            sund: {
              primary: '#0f766e',
              'primary-light': '#14b8a6',
              accent: '#5eead4',
              bg: '#f8fafc',
              'bg-dark': '#0f172a',
              surface: '#ffffff',
              'surface-dark': '#1e2937',
              text: '#0f172a',
              'text-dark': '#e2e8f0',
              muted: '#64748b'
            }
          }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .chat-container { scrollbar-width: thin; }
    textarea { resize: none; }
  </style>
</head>
<body class="bg-sund-bg dark:bg-sund-bg-dark text-sund-text dark:text-sund-text-dark min-h-screen">

<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div id="sidebar" class="w-72 bg-sund-surface dark:bg-sund-surface-dark border-r border-sund-muted/10 flex flex-col transition-transform duration-300 md:translate-x-0 -translate-x-full">

    <div class="p-6 flex items-center gap-3 border-b border-sund-muted/10">
      <!-- Ícone SVG do Coala -->
      <svg width="36" height="36" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="256" cy="256" r="256" fill="#0f766e"/>
        <ellipse cx="256" cy="225" rx="92" ry="82" fill="#f1f5f9"/>
        <circle cx="185" cy="170" r="42" fill="#f1f5f9"/>
        <circle cx="327" cy="170" r="42" fill="#f1f5f9"/>
        <circle cx="225" cy="215" r="13" fill="#134e4a"/>
        <circle cx="287" cy="215" r="13" fill="#134e4a"/>
        <ellipse cx="256" cy="240" rx="19" ry="15" fill="#134e4a"/>
        <path d="M235 255 Q256 267 277 255" stroke="#134e4a" stroke-width="7" stroke-linecap="round" fill="none"/>
        <path d="M310 275 Q380 230 405 305" stroke="#14b8a6" stroke-width="32" stroke-linecap="round" fill="none"/>
        <circle cx="405" cy="310" r="26" fill="#14b8a6"/>
        <circle cx="405" cy="310" r="14" fill="#0f766e"/>
      </svg>
      <h1 class="text-2xl font-semibold tracking-tighter">sundai</h1>
    </div>

    <div class="p-4">
      <button onclick="newChat()" 
              class="w-full bg-sund-primary hover:bg-sund-primary-light text-white py-3.5 rounded-3xl font-medium flex items-center justify-center gap-2 transition-all">
        <i class="fas fa-plus"></i>
        Novo Caso Clínico
      </button>
    </div>

    <div class="px-6 py-3 text-xs font-medium text-sund-muted tracking-widest">MEUS CASOS</div>
    <div id="cases-list" class="flex-1 overflow-y-auto px-4 space-y-1"></div>

    <div class="p-6 border-t border-sund-muted/10">
      <div id="user-info" class="flex items-center gap-3 px-3 py-2 rounded-2xl hover:bg-sund-muted/10"></div>
      <button onclick="logout()" 
              class="mt-6 w-full flex items-center justify-center gap-2 text-red-500 hover:text-red-600 py-2 text-sm">
        <i class="fas fa-sign-out-alt"></i> Terminar Sessão
      </button>
    </div>
  </div>

  <!-- Área Principal -->
  <div class="flex-1 flex flex-col">
    <!-- Header -->
    <div class="h-14 bg-sund-surface dark:bg-sund-surface-dark border-b border-sund-muted/10 flex items-center px-5">
      <button onclick="toggleSidebar()" class="md:hidden mr-4 text-2xl text-sund-muted">
        <i class="fas fa-bars"></i>
      </button>
      <h2 id="chat-title" class="font-medium text-lg">assistente clínico</h2>
      
      <div class="ml-auto flex items-center gap-2 text-sund-muted text-sm">
        <i class="fas fa-circle text-xs text-sund-primary"></i>
        online
      </div>
    </div>

    <!-- Chat Container -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-5 md:p-6 bg-sund-bg dark:bg-sund-bg-dark space-y-8"></div>

    <!-- Input -->
    <div class="p-5 bg-sund-surface dark:bg-sund-surface-dark border-t border-sund-muted/10">
      <div class="max-w-3xl mx-auto relative">
        <textarea id="user-input" rows="1"
                  class="w-full bg-sund-bg dark:bg-sund-surface-dark border border-sund-muted/20 rounded-3xl px-6 py-4 pr-16 focus:outline-none focus:border-sund-primary resize-y text-base"
                  placeholder="Descreva o caso clínico..."></textarea>
        
        <button onclick="sendMessage()" 
                class="absolute right-4 bottom-3 bg-sund-primary hover:bg-sund-primary-light text-white p-3.5 rounded-2xl transition-all">
          <i class="fas fa-arrow-up"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Login -->
<div id="login-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
  <div class="bg-sund-surface dark:bg-sund-surface-dark p-8 rounded-3xl w-full max-w-md mx-4">
    <h2 class="text-2xl font-semibold text-center mb-8">entrar no sundai</h2>
    <input id="login-email" type="email" placeholder="email" 
           class="w-full bg-sund-bg dark:bg-sund-surface-dark border border-sund-muted/30 rounded-2xl px-5 py-3.5 mb-3">
    <input id="login-password" type="password" placeholder="password" 
           class="w-full bg-sund-bg dark:bg-sund-surface-dark border border-sund-muted/30 rounded-2xl px-5 py-3.5 mb-6">
    
    <button onclick="performLogin()" 
            class="w-full bg-sund-primary hover:bg-sund-primary-light py-4 rounded-2xl font-medium text-white">
      Entrar
    </button>
    <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden"></p>
  </div>
</div>

<script>
// ===================== CONFIG =====================
const API_BASE = "http://127.0.0.1:8000";
let token = localStorage.getItem("sundai_access_token");
let messages = [];

// ===================== MOBILE SIDEBAR =====================
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.classList.toggle("-translate-x-full");
}

// ===================== TEMA =====================
function toggleTheme() {
  document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
}

// ===================== AUTH =====================
async function performLogin() { /* mantém tua função atual */ }
async function loadCurrentUser() { /* mantém tua função atual */ }
function logout() { localStorage.removeItem("sundai_access_token"); window.location.reload(); }

// ===================== CHAT =====================
function addMessage(role, content) { /* mantém tua função atual */ }
async function sendMessage() { /* mantém tua função atual */ }
function newChat() { /* mantém tua função atual */ }

// ===================== INIT =====================
async function initApp() {
  if (!token) {
    document.getElementById("login-modal").classList.remove("hidden");
    return;
  }
  await loadCurrentUser();
  newChat();
}

window.onload = () => {
  if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
  initApp();
};
</script>
</body>
</html>
